name = "friday"
main = "./worker/index.js"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# Daily digest email (see runDailyDigest in worker/index.js).
# Cron runs in UTC: 11:00 UTC = 6am US Central during DST / 5am in winter.
# Test locally with: wrangler dev --test-scheduled  then
#   curl "http://localhost:8787/__scheduled?cron=0+11+*+*+*"
[triggers]
crons = ["0 11 * * *"]

[vars]
# Used to build links in emails (invite accept links). Not secret.
PUBLIC_APP_URL = "https://ezyfriday.com"
# Must be on a domain you've verified with Resend, or invite emails will fail to send.
RESEND_FROM_EMAIL = "ezyFriday <invites@ezyfriday.com>"

# SUPABASE_URL, SUPABASE_SECRET_KEY, SUPABASE_PUBLISHABLE_KEY, RESEND_API_KEY are NOT set here.
#   Local:      put them in web/.dev.vars  (git-ignored)
#   Production: `wrangler secret put <NAME>` for each
